<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cybertruck Drive</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="game-container"></div>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div id="speedometer">
        <span id="speed-value">0</span>
        <span id="speed-unit">km/h</span>
      </div>
    </div>

    <!-- Pause Menu -->
    <div id="pause-screen" class="overlay hidden">
      <h1 class="title">PAUSED</h1>
      <button id="resume-btn" class="drive-btn pause-menu-item">RESUME</button>
      <button id="switch-car-btn" class="drive-btn pause-menu-item">SWITCH CAR</button>
      <button id="switch-world-btn" class="drive-btn pause-menu-item">SWITCH WORLD</button>
      <button id="new-world-btn" class="drive-btn pause-menu-item">NEW WORLD</button>
    </div>

    <!-- Car Picker (from pause menu) -->
    <div id="car-picker-screen" class="overlay hidden">
      <h1 class="title">CHOOSE CAR</h1>
      <button class="drive-btn car-pick-option" data-car="cybertruck">
        <svg class="car-icon" viewBox="0 0 120 50" fill="currentColor"><polygon points="10,38 18,38 22,28 42,14 82,14 100,22 110,28 110,38 102,38 98,44 88,44 84,38 36,38 32,44 22,44 18,38"/><circle cx="27" cy="42" r="6" fill="rgba(0,0,0,0.3)"/><circle cx="93" cy="42" r="6" fill="rgba(0,0,0,0.3)"/><line x1="42" y1="14" x2="52" y2="28" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/><line x1="68" y1="14" x2="68" y2="28" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/></svg>
        <span>CYBERTRUCK</span>
      </button>
      <button class="drive-btn car-pick-option" data-car="model-s">
        <svg class="car-icon" viewBox="0 0 120 50" fill="currentColor"><path d="M12,36 Q14,28 24,24 Q40,18 60,16 Q80,16 96,20 Q106,24 110,30 L110,36 L104,36 Q102,44 94,44 Q86,44 84,36 L36,36 Q34,44 26,44 Q18,44 16,36 Z"/><circle cx="26" cy="42" r="6" fill="rgba(0,0,0,0.3)"/><circle cx="94" cy="42" r="6" fill="rgba(0,0,0,0.3)"/><path d="M32,24 Q50,20 70,20 Q82,20 92,22" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" fill="none"/></svg>
        <span>MODEL S</span>
      </button>
      <button id="car-picker-back-btn" class="drive-btn">BACK</button>
    </div>

    <!-- World Picker (from pause menu) -->
    <div id="world-picker-screen" class="overlay hidden">
      <h1 class="title">CHOOSE WORLD</h1>
      <div class="world-pick-grid">
        <button class="world-pick-option" data-world="countryside"><span class="world-preview"></span><span>COUNTRYSIDE</span></button>
        <button class="world-pick-option" data-world="downtown"><span class="world-preview"></span><span>DOWNTOWN</span></button>
        <button class="world-pick-option" data-world="suburbs"><span class="world-preview"></span><span>SUBURBS</span></button>
        <button class="world-pick-option" data-world="stunt-arena"><span class="world-preview"></span><span>STUNT ARENA</span></button>
        <button class="world-pick-option" data-world="snow-peaks"><span class="world-preview"></span><span>SNOW PEAKS</span></button>
        <button class="world-pick-option" data-world="mountain-pass"><span class="world-preview"></span><span>MOUNTAIN PASS</span></button>
        <button class="world-pick-option" data-world="desert"><span class="world-preview"></span><span>DESERT</span></button>
        <button class="world-pick-option" data-world="coastal"><span class="world-preview"></span><span>COASTAL</span></button>
      </div>
      <button id="world-picker-back-btn" class="drive-btn">BACK</button>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay">
      <h1 class="title" data-text="CYBERTRUCK">CYBERTRUCK</h1>
      <p class="subtitle">EXPLORE THE LANDSCAPE</p>

      <div id="car-selector">
        <button class="car-option selected" data-car="cybertruck">
          <svg class="car-icon" viewBox="0 0 120 50" fill="currentColor"><polygon points="10,38 18,38 22,28 42,14 82,14 100,22 110,28 110,38 102,38 98,44 88,44 84,38 36,38 32,44 22,44 18,38"/><circle cx="27" cy="42" r="6" fill="rgba(0,0,0,0.3)"/><circle cx="93" cy="42" r="6" fill="rgba(0,0,0,0.3)"/><line x1="42" y1="14" x2="52" y2="28" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/><line x1="68" y1="14" x2="68" y2="28" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/></svg>
          <span>CYBERTRUCK</span>
        </button>
        <button class="car-option" data-car="model-s">
          <svg class="car-icon" viewBox="0 0 120 50" fill="currentColor"><path d="M12,36 Q14,28 24,24 Q40,18 60,16 Q80,16 96,20 Q106,24 110,30 L110,36 L104,36 Q102,44 94,44 Q86,44 84,36 L36,36 Q34,44 26,44 Q18,44 16,36 Z"/><circle cx="26" cy="42" r="6" fill="rgba(0,0,0,0.3)"/><circle cx="94" cy="42" r="6" fill="rgba(0,0,0,0.3)"/><path d="M32,24 Q50,20 70,20 Q82,20 92,22" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" fill="none"/></svg>
          <span>MODEL S</span>
        </button>
      </div>

      <div id="world-selector">
        <button class="world-option selected" data-world="countryside"><span class="world-preview"></span><span>COUNTRYSIDE</span></button>
        <button class="world-option" data-world="downtown"><span class="world-preview"></span><span>DOWNTOWN</span></button>
        <button class="world-option" data-world="suburbs"><span class="world-preview"></span><span>SUBURBS</span></button>
        <button class="world-option" data-world="stunt-arena"><span class="world-preview"></span><span>STUNT ARENA</span></button>
        <button class="world-option" data-world="snow-peaks"><span class="world-preview"></span><span>SNOW PEAKS</span></button>
        <button class="world-option" data-world="mountain-pass"><span class="world-preview"></span><span>MOUNTAIN PASS</span></button>
        <button class="world-option" data-world="desert"><span class="world-preview"></span><span>DESERT</span></button>
        <button class="world-option" data-world="coastal"><span class="world-preview"></span><span>COASTAL</span></button>
      </div>

      <button id="start-btn" class="drive-btn">DRIVE</button>
      <div class="controls-info">
        <div class="control-row"><kbd>&larr;</kbd> <kbd>&rarr;</kbd> or <kbd>A</kbd> <kbd>D</kbd> STEER</div>
        <div class="control-row"><kbd>&uarr;</kbd> or <kbd>W</kbd> ACCELERATE &mdash; <kbd>&darr;</kbd> or <kbd>S</kbd> BRAKE</div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
